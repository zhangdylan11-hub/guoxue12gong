    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
            position: relative;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.2);
            height: 8px;
            border-radius: 4px;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress {
            background: white;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-container {
            padding: 30px 20px;
            min-height: 400px;
        }

        .question-number {
            font-size: 14px;
            color: #667eea;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .question-text {
            font-size: 20px;
            margin-bottom: 30px;
            line-height: 1.6;
            color: #222;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .option {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            text-align: left;
            font-size: 16px;
            line-height: 1.5;
        }

        .option:hover {
            background: #e8e9ff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .option.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .option.selected:hover {
            background: linear-gradient(135deg, #5a6fd8 0%, #6a3f92 100%);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }

        .btn-prev {
            background: #e9ecef;
            color: #495057;
        }

        .btn-prev:hover {
            background: #dee2e6;
        }

        .btn-prev:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-next {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-next:hover {
            background: linear-gradient(135deg, #5a6fd8 0%, #6a3f92 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-next:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-submit {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-submit:hover {
            background: linear-gradient(135deg, #e67bf0 0%, #e94a5e 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        /* 结果页面样式 */
        .result-container {
            display: none;
            padding: 30px 20px;
        }

        .result-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .result-title {
            font-size: 28px;
            color: #667eea;
            margin-bottom: 10px;
        }

        .result-subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 20px;
        }

        .overall-score {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 30px;
        }

        .overall-score-value {
            font-size: 48px;
            font-weight: bold;
            margin: 10px 0;
        }

        .overall-score-text {
            font-size: 18px;
            opacity: 0.9;
        }

        .summary-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-left: 4px solid #667eea;
        }

        .summary-title {
            font-size: 20px;
            color: #667eea;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .summary-content {
            font-size: 16px;
            line-height: 1.8;
            color: #555;
        }

        .strength-section, .focus-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 22px;
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .palace-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .palace-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .palace-score {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .palace-level {
            display: inline-block;
            padding: 5px 15px;
            background: #667eea;
            color: white;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .palace-level.weak {
            background: #f5576c;
        }

        .palace-level.normal {
            background: #ffb822;
        }

        .palace-level.strong {
            background: #667eea;
        }

        .palace-level.very-strong {
            background: #48c774;
        }

        .palace-level.super-strong {
            background: #23d160;
        }

        .palace-interpretation {
            font-size: 15px;
            line-height: 1.6;
            color: #555;
        }

        .palace-advice {
            font-size: 15px;
            line-height: 1.6;
            color: #667eea;
            margin-top: 10px;
            font-style: italic;
        }

        .detailed-analysis {
            margin-top: 30px;
        }

        .palace-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .palace-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
            text-align: center;
        }

        .palace-card-name {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .palace-card-score {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }

        .wisdom-section {

            color: white;
            padding: 25px;
            border-radius: 12px;
            margin-top: 30px;

        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }

        }

        .footer {

            padding: 20px;
            color: #666;
            font-size: 14px;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
        }

        @media (max-width: 600px) {
            .header h1 {

            }

            .question-text {

            }

            .controls {
                flex-direction: column;
                gap: 10px;
            }

            .btn {
                width: 100%;
            }

            .palace-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

                showSingleFocusSection(weightedScores);
                
                // 显示详细分析
                showDetailedAnalysis(weightedScores);
                
                // 显示传统文化智慧
                showWisdom();
                
            }, 1500);
        }

        // 生成总结
        function generateSummary(scores) {
            const overallScore = scores['相貌宫'];
            const level = getLevel(overallScore);
            
            // 随机选择一个总结模板
            const templates = summaryTemplates[level];
            const randomIndex = Math.floor(Math.random() * templates.length);
            const summary = templates[randomIndex];
            
            document.getElementById('summaryContent').innerHTML = summary;
        }

        // 显示单个核心优势宫位
        function showSingleStrengthSection(scores) {
            const sortedPalaces = Object.entries(scores)
                .sort((a, b) => b[1] - a[1]);
            
            // 只取第一个
            const [palace, score] = sortedPalaces[0];
            const level = getLevel(score);
            const levelClass = getLevelClass(level);
            const interpretation = palaceInterpretations[palace].levels[level];
            const advice = palaceInterpretations[palace].advice[level] || '';
            
            let html = `
                <div class="palace-item">
                    <div class="palace-name">${palace}</div>
                    <div class="palace-score">${score.toFixed(1)} 分</div>
                    <div class="palace-level ${levelClass}">${getLevelText(palace, score)}</div>
                    <div class="palace-interpretation">${interpretation}</div>
                    ${advice ? `<div class="palace-advice">💡 建议：${advice}</div>` : ''}
                </div>
            `;
            
            document.getElementById('strengthSection').innerHTML = html;
        }

        // 显示单个重点关注宫位
        function showSingleFocusSection(scores) {
            const sortedPalaces = Object.entries(scores)
                .sort((a, b) => a[1] - b[1]);
            
            // 只取第一个
            const [palace, score] = sortedPalaces[0];
            const level = getLevel(score);
            const levelClass = getLevelClass(level);
            const interpretation = palaceInterpretations[palace].levels[level];
            const advice = palaceInterpretations[palace].advice[level] || '';
            
            let html = `
                <div class="palace-item">
                    <div class="palace-name">${palace}</div>
                    <div class="palace-score">${score.toFixed(1)} 分</div>
                    <div class="palace-level ${levelClass}">${getLevelText(palace, score)}</div>
                    <div class="palace-interpretation">${interpretation}</div>
                    ${advice ? `<div class="palace-advice">💡 建议：${advice}</div>` : ''}
                </div>
            `;
            
            document.getElementById('focusSection').innerHTML = html;
        }

        // 显示详细分析
        function showDetailedAnalysis(scores) {
            let html = '';
            Object.entries(scores).forEach(([palace, score]) => {
                const level = getLevel(score);
                html += `
                    <div class="palace-card">
                        <div class="palace-card-name">${palace}</div>
                        <div class="palace-card-score">${score.toFixed(1)}</div>
                    </div>
                `;
            });
            
            document.getElementById('palaceGrid').innerHTML = html;
        }

        // 显示传统文化智慧
        function showWisdom() {
            // 随机选择3条引用
            const selectedQuotes = [];
            const shuffled = [...wisdomQuotes].sort(() => 0.5 - Math.random());
            for (let i = 0; i < 3 && i < shuffled.length; i++) {
                selectedQuotes.push(shuffled[i]);
            }
            
            document.getElementById('wisdomContent').innerHTML = selectedQuotes.join('<br><br>');
        }

        // 获取等级
        function getLevel(score) {
            if (score >= 25) return 'super-strong';
            if (score >= 19) return 'very-strong';
            if (score >= 13) return 'strong';
            if (score >= 7) return 'normal';
            return 'weak';
        }

        // 获取等级样式类
        function getLevelClass(level) {
            return level;
        }

        // 获取等级文本
        function getLevelText(palace, score) {
            const level = getLevel(score);
            const levelNames = {
                'weak': '弱势宫位',
                'normal': '普通宫位',
                'strong': '强势宫位',
                'very-strong': '极强宫位',
                'super-strong': '超强势宫位'
            };
            return levelNames[level];
        }

        // 分享结果
        function shareResult() {
            const title = '我的国学十二宫测试结果';
            const text = '我刚刚完成了国学十二宫测试，快来测测你的运势格局吧！';
            const url = window.location.href;
            
            if (navigator.share) {
                navigator.share({
                    title: title,
                    text: text,
                    url: url
                }).catch(console.error);
            } else {
                alert('请点击"保存图片"按钮，然后分享图片给朋友！');
            }
        }

        // 下载图片
        async function downloadImage() {
            const resultContainer = document.getElementById('resultContainer');
            
            // 显示加载状态
            const downloadBtn = document.querySelector('.btn-download');
            const originalText = downloadBtn.textContent;
            downloadBtn.textContent = '生成中...';
            downloadBtn.disabled = true;
            
            try {
                // 使用html2canvas生成图片
                const canvas = await html2canvas(resultContainer, {
                    scale: 2,
                    backgroundColor: '#ffffff',
                    width: resultContainer.offsetWidth,
                    height: resultContainer.offsetHeight
                });
                
                // 转换为图片并下载
                const link = document.createElement('a');
                link.download = '国学十二宫测试结果_' + new Date().getTime() + '.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                alert('图片已保存！您可以分享给朋友了。');
                
            } catch (error) {
                console.error('生成图片失败:', error);
                alert('生成图片失败，请重试。');
            } finally {
                downloadBtn.textContent = originalText;
                downloadBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
